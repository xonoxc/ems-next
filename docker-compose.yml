services:
  app:
    build: .
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgres://ems:ems_password@postgres:5432/ems
      BETTER_AUTH_SECRET: your-secret-here-min-16-chars
      BETTER_AUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: ems
      POSTGRES_PASSWORD: ems_password
      POSTGRES_DB: ems
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
